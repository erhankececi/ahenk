  <circle cx="512" cy="158" r="12" fill="#E8D2A2"/>

  <!-- A monogram -->
  <path d="M512 250 L300 790 L388 790 L512 372 Z" fill="url(#ahA)"/>
  <path d="M512 250 L724 790 L636 790 L512 372 Z" fill="url(#ahA)"/>

  <!-- Harmoni düğümü (mücevher) -->
  <rect x="404" y="588" width="216" height="26" rx="13" fill="url(#ahA)"/>
  <circle cx="512" cy="601" r="23" fill="#0E0D10"/><circle cx="512" cy="601" r="10" fill="#E8D2A2"/>
</svg>
