<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ahenk app icon">
  <defs>
    <linearGradient id="ahA" x1="300" y1="180" x2="724" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8D2A2"/>
      <stop offset="0.5" stop-color="#C7A977"/>
      <stop offset="1" stop-color="#8C7244"/>
    </linearGradient>
    <radialGradient id="ahSheen" cx="0.5" cy="0" r="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tam kare onyx zemin (iOS/Android köşeleri kendi maskeler) -->
  <rect width="1024" height="1024" fill="#0E0D10"/>
  <rect width="1024" height="1024" fill="url(#ahSheen)"/>

  <!-- Aura arkı (harmoni) + kıvılcım — "karakter önce" -->
